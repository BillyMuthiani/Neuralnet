name: Tests

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Install tooling
        run: |
          pip install \
            pytest==8.4.2 \
            pytest-cov==7.0.0 \
            ruff==0.12.11 \
            mypy==1.17.1

      - name: Show versions
        run: |
          python --version
          pip show mypy
          pip show numpy
          ruff --version

      - name: Run Ruff
        run: ruff check .

      - name: Run mypy
        run: mypy kronyx

  tests:
    name: Python ${{ matrix.python-version }}
    needs: lint
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: |
          pytest --cov=kronyx --cov-report=xml