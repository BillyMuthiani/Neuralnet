site_name: Kronyx
site_description: Lightweight deep learning framework built from first principles using NumPy
site_url: https://kronyx.github.io/kronyx
repo_url: https://github.com/Kronyx/kronyx
repo_name: Kronyx/kronyx
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
    - scheme: slate
      primary: indigo
      accent: indigo
  features:
    - navigation.expand
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest

plugins:
  - search

markdown_extensions:
  - admonition
  - codehilite
  - footnotes
  - meta
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quickstart.md
  - Tutorials:
      - Getting Started: getting_started.md
      - Sequential API: sequential.md
      - Layers: layers.md
      - Training: training.md
      - Callbacks: callbacks.md
      - Serialization: serialization.md
  - Examples:
      - Examples Gallery: examples.md
      - Benchmarks: benchmarks.md
  - API Reference:
      - Models: api/models.md
      - Layers: api/layers.md
      - Optimizers: api/optimizers.md
      - Losses: api/losses.md
      - Metrics: api/metrics.md
      - Callbacks: api/callbacks.md
      - Serialization: api/serialization.md
  - Contributing:
      - Roadmap: ../ROADMAP.md
      - Changelog: ../CHANGELOG.md
      - Code of Conduct: ../CODE_OF_CONDUCT.md